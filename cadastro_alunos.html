<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='style.css'>
    <script src='server.js'>
document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:3000/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("mensagem").innerText = data;
    })
    .catch(err => {
        console.error(err);
    });
});

    </script>
</head>
<body>
    <header>
        <h1>IFC - SIGAA - Sistema Integrado de Gestão de Atividades Acadêmicas</h1>
    </header>

    <h1 class="h1_cadastro">CADASTRAR-SE COMO ALUNO</h1>

    <div class="div_pai">
    <form action="http://localhost:3000/register" method="post">
    <label>Nome de usuário</label>
    <input name="username" type="text" placeholder="Digite seu usuário" required>

    <label>Senha</label>
    <input name="password" type="password" placeholder="Digite sua senha" required>

    <div class="pai_botao">
        <button type="submit" class="submit">Cadastrar</button>
    </div>
</div>
</body>

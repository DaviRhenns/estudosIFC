<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Exemplo de HTML e CSS</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header><h2 cla>IFC - SIGAA - Sistema Integrado de Gestão de Atividades Acadêmicas</h2></header>

    <h3 class="h1_cadastro">Cadastro de Alunos</h3>
    
    <div class="div_pai_cadastro"> 
        <div class="div_filho_cadastro">
            <form action="">
        <label>Matricula</label><br>
        <input type="text" placeholder="digite sua matricula" required>

        <label>CPF</label><br>
        <input type="text" placeholder="digite seu CPF" required>

        <label>Email</label><br>
        <input type="email" placeholder="digite seu email" required>
        </form>
        </div>
            
        <div class="div_filho_cadastro">
        <form id="registerForm" action="/register" method="post">
        <label>Nome de usuário</label><br>
        <input name="username" type="text" placeholder="crie seu nome de usuario" required>

        <label>Senha</label><br>
        <input name="password" type="password" placeholder="crie sua senha" required>

        <button type="submit" class="submit">Cadastrar</button>
        </form>
        </div>
    </div>   
     
    

    <p id="mensagem"></p>

    <script>
        document.getElementById("registerForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const username = document.querySelector("input[name='username']").value;
            const password = document.querySelector("input[name='password']").value;

            fetch("https://upgraded-space-funicular-5g9jqqpj9vwghv6w-3000.app.github.dev/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.text())
            .then(data => {
                if (data === "Usuário cadastrado com sucesso!") {
                    window.location.href = 'principal.html';
                } else {
                    document.getElementById("mensagem").innerText = data;
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById("mensagem").innerText = "Erro na conexão";
            });
        });
    </script>
</body>
</html>
